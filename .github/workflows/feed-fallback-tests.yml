name: Feed Fallback Tests

on:
  pull_request:
    paths:
      - 'src/services/newsService.js'
      - 'src/services/newsServiceFallback.js'
      - 'src/services/__tests__/newsService.fallback.test.js'
      - '.github/workflows/feed-fallback-tests.yml'

jobs:
  feed-fallback-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run feed fallback integration tests
        run: node --test src/services/__tests__/newsService.fallback.test.js
