name: Comment Persistence Tests

on:
  pull_request:
    paths:
      - "src/services/firebase/commentsService.js"
      - "src/services/firebase/commentsTree.js"
      - "src/components/EnhancedCommentSystem.jsx"
      - "src/services/__tests__/commentsService.integration.test.js"
      - ".github/workflows/comment-persistence-tests.yml"

jobs:
  comment-persistence-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run comment persistence integration tests
        run: |
          node --test src/services/__tests__/commentsService.integration.test.js
