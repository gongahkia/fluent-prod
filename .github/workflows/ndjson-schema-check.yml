name: NDJSON Schema Check

on:
  pull_request:
    paths:
      - 'cache/news-cache.txt'
      - 'scripts/validate-ndjson-schema.mjs'
      - '.github/workflows/ndjson-schema-check.yml'

jobs:
  validate-ndjson:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate NDJSON schema fixture
        run: node scripts/validate-ndjson-schema.mjs cache/news-cache.txt
