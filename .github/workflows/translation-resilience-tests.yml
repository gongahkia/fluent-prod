name: Translation Resilience Tests

on:
  pull_request:
    paths:
      - "src/services/translationService.js"
      - "src/services/translationCircuitBreaker.js"
      - "src/services/translationCacheStorage.js"
      - "src/lib/wordDatabase.js"
      - "src/lib/wordRequestController.js"
      - "src/services/__tests__/translationService.circuitBreaker.test.js"
      - "src/services/__tests__/translationService.cacheVersion.test.js"
      - "src/services/__tests__/wordDatabase.cancellation.test.js"
      - ".github/workflows/translation-resilience-tests.yml"

jobs:
  translation-resilience-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run translation resilience tests
        run: |
          node --test src/services/__tests__/translationService.circuitBreaker.test.js
          node --test src/services/__tests__/translationService.cacheVersion.test.js
          node --test src/services/__tests__/wordDatabase.cancellation.test.js
