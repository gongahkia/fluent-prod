name: Translation Unit Tests

on:
  pull_request:
    paths:
      - "src/services/translationService.js"
      - "src/services/translationPipeline.js"
      - "src/services/__tests__/**"
      - ".github/workflows/translation-unit-tests.yml"

jobs:
  test-translation-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run translation unit tests
        run: |
          node --test src/services/__tests__/translationService.fallback.test.js
          node --test src/services/__tests__/translationService.sanitization.test.js
          node --test src/services/__tests__/translationService.timeout.test.js
